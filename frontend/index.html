<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>量化数据平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
      .app { min-height: 100vh; padding: 20px; max-width: 1200px; margin: 0 auto; }
      .header { text-align: center; margin-bottom: 30px; }
      .header h1 { color: #333; font-size: 28px; }
      .subtitle { color: #666; margin-top: 8px; }
      .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
      .search-input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
      .search-btn { padding: 12px 24px; background: #1890ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
      .search-btn:hover { background: #40a9ff; }
      .stock-list { margin-bottom: 30px; }
      .stock-list h3 { margin-bottom: 12px; color: #333; }
      .stocks { display: flex; flex-wrap: wrap; gap: 8px; }
      .stock-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: white; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
      .stock-item:hover { border-color: #1890ff; }
      .stock-item.active { background: #e6f7ff; border-color: #1890ff; }
      .stock-code { font-weight: bold; color: #1890ff; }
      .stock-name { color: #333; }
      .stock-type { font-size: 12px; color: #999; padding: 2px 6px; background: #f0f0f0; border-radius: 4px; }
      .chart-container { background: white; padding: 20px; border-radius: 12px; min-height: 500px; }
      .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .chart-header h3 { color: #333; margin: 0; }
      .export-btns { display: flex; gap: 8px; }
      .export-btn { padding: 6px 12px; background: #52c41a; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
      .export-btn:hover { background: #73d13d; }
      .loading, .empty { text-align: center; padding: 60px; color: #999; }
      .kline-chart { width: 100%; height: 500px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { createApp, ref, onMounted, watch } = Vue;
      
      // Axios简单实现
      const axios = {
        async get(url) {
          const res = await fetch(url);
          return { data: await res.json() };
        }
      };
      
      // K线图组件
      const KLineChart = {
        props: ['data', 'name'],
        template: '<div ref="chartRef" class="kline-chart"></div>',
        setup(props) {
          const chartRef = ref(null);
          let chart = null;
          
          const initChart = () => {
            if (!chartRef.value) return;
            chart = echarts.init(chartRef.value);
            updateChart();
          };
          
          const updateChart = () => {
            if (!chart || !props.data.length) return;
            
            const dates = props.data.map(d => d.date);
            const ohlc = props.data.map(d => [d.open, d.close, d.low, d.high]);
            const volumes = props.data.map(d => d.volume);
            
            const colors = { up: '#ef232a', down: '#14b143', border: '#000000' };
            
            const option = {
              tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
              legend: { data: ['K线', '成交量'] },
              grid: [
                { left: '10%', right: '10%', height: '60%' },
                { left: '10%', right: '10%', top: '75%', height: '15%' }
              ],
              xAxis: [
                { type: 'category', data: dates, boundaryGap: false, axisLine: { onZero: false } },
                { type: 'category', gridIndex: 1, data: dates, boundaryGap: false, axisLine: { onZero: false }, axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false } }
              ],
              yAxis: [
                { scale: true, splitArea: { show: true } },
                { scale: true, gridIndex: 1, splitNumber: 2, axisLabel: { show: false }, axisLine: { show: false }, axisTick: { show: false }, splitLine: { show: false } }
              ],
              dataZoom: [{ type: 'inside', xAxisIndex: [0, 1], start: 50, end: 100 }],
              series: [
                { name: 'K线', type: 'candlestick', data: ohlc, itemStyle: { color: colors.up, color0: colors.down, borderColor: colors.border, borderColor0: colors.border } },
                { name: '成交量', type: 'bar', xAxisIndex: 1, yAxisIndex: 1, data: volumes, itemStyle: { color: (params) => { const kData = ohlc[params.dataIndex]; return kData && kData[1] >= kData[0] ? colors.up : colors.down; } } }
              ]
            };
            
            chart.setOption(option);
          };
          
          watch(() => props.data, updateChart, { deep: true });
          
          onMounted(() => { initChart(); window.addEventListener('resize', () => chart && chart.resize()); });
          
          return { chartRef };
        }
      };
      
      // 主应用
      const App = {
        components: { KLineChart },
        template: `
          <div class="app">
            <header class="header">
              <h1>📈 量化数据平台</h1>
              <p class="subtitle">股票行情查询与分析</p>
            </header>
            <main class="main">
              <div class="search-box">
                <input v-model="keyword" @input="handleSearch" type="text" placeholder="搜索股票代码或名称..." class="search-input" />
                <button @click="handleSearch" class="search-btn">搜索</button>
              </div>
              <div class="stock-list">
                <h3>股票列表</h3>
                <div class="stocks">
                  <div v-for="stock in stocks" :key="stock.code" :class="['stock-item', { active: selectedStock?.code === stock.code }]" @click="selectStock(stock)">
                    <span class="stock-code">{{ stock.code }}</span>
                    <span class="stock-name">{{ stock.name }}</span>
                    <span class="stock-type">{{ stock.stock_type === 'index' ? '指数' : '股票' }}</span>
                  </div>
                </div>
              </div>
              <div class="chart-container">
                <div class="chart-header">
                  <h3>{{ selectedStock?.name || '请选择股票' }} - K线图</h3>
                  <div class="export-btns" v-if="selectedStock">
                    <button @click="exportData('csv')" class="export-btn">导出CSV</button>
                    <button @click="exportData('json')" class="export-btn">导出JSON</button>
                  </div>
                </div>
                <div v-if="loading" class="loading">加载中...</div>
                <div v-else-if="klineData.length === 0" class="empty">{{ selectedStock ? '暂无数据' : '请选择股票' }}</div>
                <KLineChart v-else :data="klineData" :name="selectedStock?.name" />
              </div>
            </main>
          </div>
        `,
        setup() {
          const keyword = ref('');
          const stocks = ref([]);
          const selectedStock = ref(null);
          const klineData = ref([]);
          const loading = ref(false);
          
          const fetchStockList = async () => {
            try {
              const res = await axios.get('/api/stock/list');
              stocks.value = res.data.data;
            } catch (e) { console.error('获取股票列表失败:', e); }
          };
          
          const handleSearch = async () => {
            if (!keyword.value.trim()) { fetchStockList(); return; }
            try {
              const res = await axios.get('/api/stock/search?keyword=' + keyword.value);
              stocks.value = res.data.data;
            } catch (e) { console.error('搜索失败:', e); }
          };
          
          const selectStock = async (stock) => {
            selectedStock.value = stock;
            loading.value = true;
            klineData.value = [];
            try {
              const res = await axios.get('/api/stock/' + stock.code);
              klineData.value = res.data.data;
            } catch (e) { console.error('获取K线数据失败:', e); }
            finally { loading.value = false; }
          };
          
          const exportData = (format) => {
            if (!selectedStock.value) return;
            const url = '/api/stock/' + selectedStock.value.code + '/export?format=' + format;
            window.open(url, '_blank');
          };
          
          onMounted(() => { fetchStockList(); });
          
          return { keyword, stocks, selectedStock, klineData, loading, handleSearch, selectStock, exportData };
        }
      };
      
      createApp(App).mount('#app');
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  </body>
</html>
