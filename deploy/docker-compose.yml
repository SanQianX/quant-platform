# 量化数据平台 - Docker配置
# 使用Windows路径格式

services:
  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: quant-db
    environment:
      POSTGRES_USER: quant_user
      POSTGRES_PASSWORD: quant_pass
      POSTGRES_DB: quant_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI后端
  backend:
    image: python:3.10-slim
    container_name: quant-backend
    ports:
      - "8000:8000"
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://quant_user:quant_pass@postgres:5432/quant_platform
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - //f/quant-platform/backend:/app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"

  # Vue3前端 (使用nginx服务)
  frontend:
    image: nginx:alpine
    container_name: quant-frontend
    ports:
      - "3000:80"
    volumes:
      - //f/quant-platform/frontend:/usr/share/nginx/html:ro
      - //f/quant-platform/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
